<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Clean copied web tables into Markdown and JSON rows for AI prompts.">
    <title>Prompt Table Cleaner</title>
    <style>
      :root {
        --ink: #141719;
        --muted: #65706d;
        --paper: #f6f3ec;
        --panel: #ffffff;
        --line: #ded8ca;
        --accent: #0f766e;
        --accent-dark: #115e59;
        --soft: #ecfdf5;
      }
      html {
        color-scheme: light dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--paper);
        color: var(--ink);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(1180px, calc(100vw - 40px));
        margin: 0 auto;
        padding: 48px 0;
      }
      .hero {
        display: grid;
        grid-template-columns: 0.9fr 1.1fr;
        gap: 32px;
        align-items: end;
        border-bottom: 1px solid var(--line);
        padding-bottom: 32px;
      }
      .eyebrow {
        margin: 0 0 14px;
        color: var(--accent-dark);
        font-size: 0.78rem;
        font-weight: 900;
        letter-spacing: 0.11em;
        text-transform: uppercase;
      }
      h1 {
        margin: 0;
        font-size: clamp(3.2rem, 8vw, 7.2rem);
        line-height: 0.9;
        letter-spacing: 0;
      }
      .hero p:last-child {
        margin: 0;
        max-width: 560px;
        color: var(--muted);
        font-size: 1.2rem;
        line-height: 1.55;
      }
      .workspace {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 18px;
        margin-top: 28px;
      }
      .panel {
        min-height: 360px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--panel);
        overflow: hidden;
      }
      .panel header {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        padding: 16px 18px;
        border-bottom: 1px solid var(--line);
        background: #faf8f3;
      }
      .panel h2 {
        margin: 0;
        font-size: 1rem;
      }
      .panel small {
        color: var(--muted);
        font-weight: 700;
      }
      textarea,
      pre {
        width: 100%;
        min-height: 292px;
        margin: 0;
        padding: 18px;
        border: 0;
        background: transparent;
        color: var(--ink);
        font: 0.95rem/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        resize: vertical;
        white-space: pre-wrap;
      }
      textarea:focus {
        outline: 3px solid rgba(15, 118, 110, 0.2);
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 16px;
      }
      button,
      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        border: 1px solid var(--accent);
        border-radius: 8px;
        padding: 0 16px;
        background: var(--accent);
        color: #ffffff;
        font-weight: 900;
        cursor: pointer;
        text-decoration: none;
      }
      button.secondary,
      .button.secondary {
        background: transparent;
        color: var(--accent-dark);
      }
      .summary {
        margin-top: 18px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--soft);
        padding: 18px;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.5;
      }
      .tabs {
        display: flex;
        gap: 8px;
      }
      .tab {
        min-height: 34px;
        padding: 0 12px;
        border-radius: 999px;
        border-color: var(--line);
        background: #ffffff;
        color: var(--muted);
        font-size: 0.82rem;
      }
      .tab.is-active {
        background: var(--ink);
        color: #ffffff;
        border-color: var(--ink);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --ink: #ecfdf5;
          --muted: #9caeaa;
          --paper: #101513;
          --panel: #17201d;
          --line: #2b3733;
          --accent: #5eead4;
          --accent-dark: #99f6e4;
          --soft: #14231f;
        }
        .panel header {
          background: #131c19;
        }
        .tab {
          background: #101513;
        }
        button.secondary,
        .button.secondary {
          background: #101513;
        }
      }
      @media (max-width: 820px) {
        main {
          width: min(100vw - 28px, 680px);
          padding: 28px 0;
        }
        .hero,
        .workspace {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <div>
          <p class="eyebrow">AI prompt utility</p>
          <h1>Paste messy tables. Get clean context.</h1>
        </div>
        <p>Turn copied table text into Markdown, JSON rows, and a prompt summary.</p>
      </section>

      <div class="actions">
        <button id="loadSample" type="button">Load sample</button>
        <button id="convert" type="button">Convert</button>
        <button class="secondary" id="copyOutput" type="button">Copy output</button>
        <a class="button secondary" href="https://github.com/yitengruntu/prompt-table-cleaner/issues/new" rel="noreferrer">Request workflow</a>
      </div>

      <section class="workspace">
        <article class="panel">
          <header>
            <div>
              <h2>Input</h2>
              <small>CSV, TSV, or copied table text</small>
            </div>
          </header>
          <textarea id="input" spellcheck="false" aria-label="Table input"></textarea>
        </article>

        <article class="panel">
          <header>
            <div>
              <h2 id="outputLabel">Markdown output</h2>
              <small id="shape">0 rows</small>
            </div>
            <div class="tabs" aria-label="Output format">
              <button class="tab is-active" id="markdownTab" type="button">MD</button>
              <button class="tab" id="jsonTab" type="button">JSON</button>
            </div>
          </header>
          <pre id="output" aria-live="polite"></pre>
        </article>
      </section>

      <div class="summary" id="summary" aria-live="polite">Paste a table, then convert it into model-friendly context.</div>
    </main>

    <script>
      const sample = `Tool,Use case,Messy input pain
ChatGPT,Strategy review,Copied tables lose structure
Codex,Codebase audit,CSV snippets need Markdown context
Claude,Document analysis,Dashboard exports include whitespace
NotebookLM,Research notes,Rows need JSON objects`;

      const input = document.querySelector("#input");
      const output = document.querySelector("#output");
      const summary = document.querySelector("#summary");
      const shape = document.querySelector("#shape");
      const outputLabel = document.querySelector("#outputLabel");
      const markdownTab = document.querySelector("#markdownTab");
      const jsonTab = document.querySelector("#jsonTab");
      const copyButton = document.querySelector("#copyOutput");
      let currentRows = [];
      let currentMode = "markdown";

      function splitLine(line, delimiter) {
        return line.split(delimiter).map((cell) => cell.trim().replace(/\s+/g, " "));
      }

      function detectDelimiter(text) {
        const first = text.split(/\r?\n/).find((line) => line.trim());
        if (!first) return ",";
        const candidates = ["\t", ",", "|"];
        return candidates
          .map((delimiter) => ({ delimiter, count: first.split(delimiter).length }))
          .sort((a, b) => b.count - a.count)[0].delimiter;
      }

      function parseTable(text) {
        const lines = text.split(/\r?\n/).map((line) => line.trim()).filter(Boolean);
        if (!lines.length) return { headers: [], rows: [] };
        const delimiter = detectDelimiter(text);
        const headers = splitLine(lines[0], delimiter).filter(Boolean);
        const rows = lines.slice(1).map((line) => {
          const cells = splitLine(line, delimiter);
          return Object.fromEntries(headers.map((header, index) => [header, cells[index] || ""]));
        });
        return { headers, rows };
      }

      function toMarkdown(headers, rows) {
        if (!headers.length) return "";
        const escapePipe = (value) => String(value).replaceAll("|", "\\|");
        const header = `| ${headers.map(escapePipe).join(" | ")} |`;
        const rule = `| ${headers.map(() => "---").join(" | ")} |`;
        const body = rows.map((row) => `| ${headers.map((headerName) => escapePipe(row[headerName] || "")).join(" | ")} |`);
        return [header, rule, ...body].join("\n");
      }

      function render() {
        const { headers, rows } = parseTable(input.value);
        currentRows = rows;
        shape.textContent = `${rows.length} rows · ${headers.length} columns`;
        summary.textContent = rows.length
          ? `Prompt summary: ${rows.length} rows across ${headers.join(", ")}. Use this as structured context.`
          : "Paste a table, then convert it into model-friendly context.";
        outputLabel.textContent = currentMode === "markdown" ? "Markdown output" : "JSON rows";
        if (!headers.length) {
          output.textContent = "Paste CSV, TSV, or copied table text to generate output.";
          return;
        }
        output.textContent = currentMode === "markdown"
          ? toMarkdown(headers, rows)
          : JSON.stringify(rows, null, 2);
        copyButton.textContent = "Copy output";
      }

      document.querySelector("#loadSample").addEventListener("click", () => {
        input.value = sample;
        render();
      });
      document.querySelector("#convert").addEventListener("click", render);
      copyButton.addEventListener("click", async () => {
        await navigator.clipboard.writeText(output.textContent);
        copyButton.textContent = "Copied";
      });
      input.addEventListener("input", render);
      markdownTab.addEventListener("click", () => {
        currentMode = "markdown";
        markdownTab.classList.add("is-active");
        jsonTab.classList.remove("is-active");
        render();
      });
      jsonTab.addEventListener("click", () => {
        currentMode = "json";
        jsonTab.classList.add("is-active");
        markdownTab.classList.remove("is-active");
        render();
      });
      input.value = sample;
      render();
    </script>
  </body>
</html>
