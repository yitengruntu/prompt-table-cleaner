<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Prompt Table Cleaner preview</title>
  <desc id="desc">A product preview showing messy CSV input converted into Markdown and JSON for AI prompts.</desc>
  <rect width="1280" height="720" fill="#F6F3EC"/>
  <rect x="64" y="56" width="1152" height="608" rx="28" fill="#FFFFFF" stroke="#DED8CA" stroke-width="2"/>
  <text x="112" y="136" fill="#115E59" font-family="ui-sans-serif, system-ui, sans-serif" font-size="24" font-weight="800" letter-spacing="2">PROMPT TABLE CLEANER</text>
  <text x="112" y="212" fill="#141719" font-family="ui-sans-serif, system-ui, sans-serif" font-size="68" font-weight="900">Messy table in.</text>
  <text x="112" y="292" fill="#141719" font-family="ui-sans-serif, system-ui, sans-serif" font-size="68" font-weight="900">Clean prompt context out.</text>
  <text x="112" y="352" fill="#65706D" font-family="ui-sans-serif, system-ui, sans-serif" font-size="28">Markdown, JSON rows, and a compact summary for AI tools.</text>

  <rect x="112" y="424" width="496" height="168" rx="18" fill="#FAF8F3" stroke="#DED8CA" stroke-width="2"/>
  <text x="144" y="472" fill="#65706D" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22" font-weight="700">Tool, Use case, Pain</text>
  <text x="144" y="516" fill="#141719" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22">Codex, Audit, CSV needs context</text>
  <text x="144" y="560" fill="#141719" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22">Claude, Docs, rows lose shape</text>

  <path d="M658 508H724" stroke="#0F766E" stroke-width="8" stroke-linecap="round"/>
  <path d="M700 484L724 508L700 532" stroke="#0F766E" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="764" y="424" width="404" height="168" rx="18" fill="#ECFDF5" stroke="#99F6E4" stroke-width="2"/>
  <text x="796" y="472" fill="#115E59" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22" font-weight="800">| Tool | Use case |</text>
  <text x="796" y="516" fill="#141719" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22">| Codex | Audit |</text>
  <text x="796" y="560" fill="#141719" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22">| Claude | Docs |</text>
</svg>
